name: Checks
on: push
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: make install
      - name: Run linters
        run: make check
